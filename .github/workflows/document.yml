name: 🧪 Document

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  doc:
    name: Generate Documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Build mdBook
        run: mdbook build

      - name: Build Rustdoc
        run: RUSTDOCFLAGS="--cfg docsrs" cargo doc --no-deps --all-features --workspace

      - name: Combine outputs
        run: |
          # mdBook output is the site root
          cp -r target/book _site
          # Rustdoc goes under /api/
          cp -r target/doc _site/api
          # Redirect /api/ to /api/rlg/
          echo '<html><head><meta http-equiv="refresh" content="0; url=rlg/index.html"></head><body></body></html>' > _site/api/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
