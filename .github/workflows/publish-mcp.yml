name: Publish to MCP Registry

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish-mcp:
    name: Publish rlg-mcp to MCP Registry
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r '.version' server.json)
            echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pkg/docker/Dockerfile.mcp
          push: true
          tags: |
            ghcr.io/sebastienrousseau/rlg-mcp:${{ steps.version.outputs.VERSION }}
            ghcr.io/sebastienrousseau/rlg-mcp:latest
          labels: |
            io.modelcontextprotocol.server.name=io.github.sebastienrousseau/rlg-mcp
            org.opencontainers.image.source=https://github.com/sebastienrousseau/rlg
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Sync version in server.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Only set the top-level `.version` (server metadata) and
          # the OCI tag inside `.packages[0].identifier`. The
          # registry's 2025-12-11 schema forbids `packages[*].version`
          # on OCI packages — version must live in the tag on the
          # identifier reference (e.g. `ghcr.io/owner/img:1.0.0`).
          jq --arg v "$VERSION" '
            .version = $v
            | .packages[0].identifier = "ghcr.io/sebastienrousseau/rlg-mcp:" + $v
            | del(.packages[0].version)
          ' server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
