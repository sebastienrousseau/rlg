name: 🚀 Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  miri:
    name: Enforce MIRI Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run MIRI
        env:
          MIRIFLAGS: "-Zmiri-tree-borrows"
        run: cargo miri test --workspace --all-features

  publish:
    name: Publish to Crates.io
    needs: [miri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_API_TOKEN }}

  binary:
    name: Cross-Compile Binaries
    needs: [miri]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      
      - name: Install Cross (Linux AArch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build Binary
        run: |
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package
        id: package
        run: |
          NAME="rlg-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            EXE="target/${{ matrix.target }}/release/rlg.exe"
            if [ -f "$EXE" ]; then
              7z a "dist/${NAME}.zip" "./$EXE"
              echo "asset=dist/${NAME}.zip" >> $GITHUB_OUTPUT
            else
              echo "Warning: binary not found at $EXE"
            fi
          else
            EXE="target/${{ matrix.target }}/release/rlg"
            if [ -f "$EXE" ]; then
              tar czf "dist/${NAME}.tar.gz" -C "$(dirname "$EXE")" "$(basename "$EXE")"
              echo "asset=dist/${NAME}.tar.gz" >> $GITHUB_OUTPUT
            else
              echo "Warning: binary not found at $EXE"
            fi
          fi
        shell: bash

      - name: Upload Release Asset
        if: steps.package.outputs.asset != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
