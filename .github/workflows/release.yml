name: 🚀 Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

# Every publishable crate in the workspace. Lockstep versions —
# every entry must match the tag's version.
#
# `xtask` is excluded (publish = false).
#
# Order matters for the publish step:
#   1. `rlg` first  — every other crate depends on it.
#   2. `rlg-cli` second — `rlg-mcp` and `rlg-report` depend on it.
#   3. The rest can publish independently of one another.

jobs:
  # ─── Verify ────────────────────────────────────────────────────────
  validate:
    name: Validate tag matches crate versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check tag matches every publishable crate
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for crate in \
              rlg \
              rlg-cli \
              rlg-mcp \
              rlg-otlp \
              rlg-redact \
              rlg-report \
              rlg-test \
              rlg-tower \
              rlg-wasm; do
            CRATE_VERSION=$(
              grep '^version' "crates/${crate}/Cargo.toml" \
                | head -1 | sed 's/.*"\(.*\)"/\1/'
            )
            echo "${crate}: ${CRATE_VERSION} (tag: ${TAG})"
            if [ "$CRATE_VERSION" != "$TAG" ]; then
              echo "::error::${crate} version (${CRATE_VERSION}) does not match tag (${TAG})"
              exit 1
            fi
          done

  # ─── CI gate ───────────────────────────────────────────────────────
  ci:
    name: Re-run CI on the tagged ref
    needs: [validate]
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: 'stable'

  # ─── Publish to crates.io ──────────────────────────────────────────
  publish:
    name: Publish workspace to crates.io
    needs: [validate, ci]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Idempotent publish: each crate is checked against the live
      # crates.io index first; if `<crate>@<version>` is already
      # published, the step logs a notice and skips. This makes
      # `gh run rerun --failed` safe after a partial-publish failure
      # (e.g. token rotation mid-release): re-running won't error on
      # the crates that already landed.
      #
      # Dependency-order, with sparse-index sleeps after the two
      # crates other workspace members depend on:
      #
      #   rlg
      #   ├── rlg-cli ─── rlg-mcp
      #   │             └─ rlg-report
      #   ├── rlg-otlp
      #   ├── rlg-redact
      #   ├── rlg-test
      #   ├── rlg-tower
      #   └── rlg-wasm
      - name: Publish workspace (idempotent, dependency-ordered)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # publish_or_skip <crate> [sparse_index_sleep_seconds]
          #
          # Returns 0 if the crate@VERSION is already on crates.io
          # (we log and skip) or if `cargo publish` succeeds.
          # Propagates failure on a real publish error.
          publish_or_skip() {
            local crate="$1"
            local sleep_after="${2:-0}"
            local url="https://crates.io/api/v1/crates/${crate}/${VERSION}"
            if curl -sf -o /dev/null "${url}"; then
              echo "::notice::${crate} ${VERSION} already on crates.io — skipping"
              return 0
            fi
            echo "::group::Publish ${crate} ${VERSION}"
            cargo publish --package "${crate}" --locked
            echo "::endgroup::"
            if [ "${sleep_after}" -gt 0 ]; then
              echo "Waiting ${sleep_after}s for sparse-index propagation…"
              sleep "${sleep_after}"
            fi
          }

          # 1. rlg first — every other workspace crate depends on it.
          publish_or_skip rlg 30
          # 2. rlg-cli second — rlg-mcp and rlg-report depend on it.
          publish_or_skip rlg-cli 30
          # 3. Independent of one another; only depend on `rlg`.
          publish_or_skip rlg-otlp
          publish_or_skip rlg-redact
          publish_or_skip rlg-test
          publish_or_skip rlg-tower
          publish_or_skip rlg-wasm
          # 4. Depend on `rlg` + `rlg-cli` — by now the sparse
          #    index has had 30s + N publish-roundtrips to catch
          #    both, so no further sleep needed.
          publish_or_skip rlg-mcp
          publish_or_skip rlg-report

  # ─── GitHub Release ────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create release with auto-generated notes
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" sbom.spdx.json --clobber
