name: 🚀 Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml version
        run: |
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          TAG="${GITHUB_REF_NAME}"
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "::error::Tag ${TAG} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi
          echo "Tag ${TAG} matches Cargo.toml version ${CARGO_VERSION}"

  publish:
    name: Publish to Crates.io
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
